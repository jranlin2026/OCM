<!DOCTYPE html>
<!--
  Design System: 极享AI口播智能体 (JIXIANG-AI)
  Template: dashboard (案例收集)
  File: prototype-cases-collect.html — 案例收集
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>极享AI — 案例收集</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--color-bg-primary:#0F0F1A;--color-bg-secondary:#1A1A2E;--color-surface:#1E1E32;--color-surface-hover:#252540;--color-surface-elevated:#2A2A3C;--color-gold:#D4A853;--color-gold-hover:#E0B96A;--color-gold-active:#C49A42;--color-gold-muted:rgba(212,168,83,0.2);--color-gold-subtle:rgba(212,168,83,0.08);--color-text-primary:#F5F5F7;--color-text-secondary:#A0A0B8;--color-text-tertiary:#6B6B82;--color-text-on-gold:#0F0F1A;--color-border:#2E2E44;--color-border-strong:#3D3D58;--color-border-gold:rgba(212,168,83,0.25);--color-divider:#2A2A40;--color-success:#22C55E;--color-warning:#F59E0B;--color-danger:#EF4444;--color-info:#3B82F6;--color-tier-blue:#3B82F6;--color-tier-green:#22C55E;--color-tier-purple:#A855F7;--color-tier-gold:#F59E0B;--space-2xs:4px;--space-xs:8px;--space-sm:12px;--space-md:16px;--space-lg:20px;--space-xl:24px;--space-2xl:32px;--space-3xl:48px;--font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--font-mono:'JetBrains Mono','SF Mono','Fira Code',monospace;--font-metric:'Inter','SF Pro Display',sans-serif;--radius-sm:4px;--radius-md:8px;--radius-lg:12px;--radius-xl:16px;--radius-pill:20px;--shadow-sm:0 1px 3px rgba(0,0,0,0.3);--shadow-md:0 4px 12px rgba(0,0,0,0.35);--shadow-lg:0 8px 24px rgba(0,0,0,0.4);--shadow-xl:0 25px 50px rgba(0,0,0,0.5);--shadow-gold:0 0 12px rgba(212,168,83,0.2)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:var(--font-sans);background:var(--color-bg-primary);color:var(--color-text-primary);line-height:1.6;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--color-border-strong);border-radius:3px}
a{color:inherit;text-decoration:none}
.layout{display:flex;min-height:100vh}
.sidebar{width:240px;min-height:100vh;background:var(--color-bg-secondary);border-right:1px solid var(--color-border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100}
.sidebar-brand{height:64px;display:flex;align-items:center;padding:0 var(--space-lg);border-bottom:1px solid var(--color-divider);gap:var(--space-sm);flex-shrink:0}
.sidebar-brand .brand-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--color-gold),var(--color-gold-hover));border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--color-text-on-gold);font-weight:700;flex-shrink:0}
.sidebar-brand .brand-text{font-size:16px;font-weight:600;color:var(--color-text-primary);letter-spacing:-0.01em}
.sidebar-brand .brand-text span{color:var(--color-gold)}
.sidebar-nav{flex:1;padding:var(--space-md) var(--space-sm);overflow-y:auto}
.nav-section{margin-bottom:var(--space-xl)}
.nav-section-title{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.06em;padding:0 var(--space-sm);margin-bottom:var(--space-xs)}
.nav-item{display:flex;align-items:center;height:44px;padding:0 var(--space-sm) 0 var(--space-md);border-radius:var(--radius-md);color:var(--color-text-secondary);font-size:14px;font-weight:400;cursor:pointer;transition:all 0.15s ease;gap:var(--space-sm);position:relative}
.nav-item i{width:20px;text-align:center;font-size:15px;color:var(--color-text-tertiary);transition:color 0.15s ease}
.nav-item:hover{background:var(--color-surface-hover);color:var(--color-text-primary)}
.nav-item:hover i{color:var(--color-text-secondary)}
.nav-item.active{background:var(--color-gold-subtle);color:var(--color-gold);font-weight:500}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--color-gold);border-radius:0 2px 2px 0}
.nav-item.active i{color:var(--color-gold)}
.nav-item .nav-badge{margin-left:auto;background:var(--color-danger);color:#fff;font-size:11px;font-weight:600;padding:0 6px;height:18px;line-height:18px;border-radius:9px;min-width:18px;text-align:center}
.sidebar-footer{padding:var(--space-md) var(--space-sm);border-top:1px solid var(--color-divider);flex-shrink:0}
.user-mini{display:flex;align-items:center;height:48px;padding:var(--space-xs) var(--space-sm);gap:var(--space-sm);cursor:pointer;border-radius:var(--radius-md);transition:background 0.15s ease}
.user-mini:hover{background:var(--color-surface-hover)}
.user-mini-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--color-gold),var(--color-tier-purple));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--color-text-on-gold);flex-shrink:0}
.user-mini-info{flex:1;min-width:0}
.user-mini-name{font-size:13px;font-weight:500;color:var(--color-text-primary);line-height:1.2}
.user-mini-role{font-size:11px;color:var(--color-text-tertiary);line-height:1.2}
.main-content{flex:1;margin-left:240px;min-height:100vh;display:flex;flex-direction:column}
.topbar{height:64px;background:var(--color-bg-secondary);border-bottom:1px solid var(--color-border);display:flex;align-items:center;padding:0 var(--space-xl);gap:var(--space-md);position:sticky;top:0;z-index:50}
.topbar-title{font-size:18px;font-weight:600;color:var(--color-text-primary);letter-spacing:-0.01em}
.topbar-title span{color:var(--color-gold)}
.topbar-spacer{flex:1}
.topbar-date{font-size:13px;color:var(--color-text-tertiary)}
.topbar-actions{display:flex;align-items:center;gap:var(--space-xs)}
.topbar-btn{width:36px;height:36px;border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s ease;font-size:16px;position:relative}
.topbar-btn:hover{background:var(--color-surface-hover);border-color:var(--color-border-strong);color:var(--color-text-primary)}
.topbar-btn .dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(--color-danger);border-radius:50%;border:2px solid var(--color-bg-secondary)}
.topbar-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--color-gold),var(--color-tier-blue));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--color-text-on-gold);cursor:pointer;margin-left:var(--space-xs)}
.content-area{padding:var(--space-xl);flex:1;display:flex;flex-direction:column;gap:var(--space-lg);max-width:1440px;width:100%;margin:0 auto}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-xs)}
.page-header h1{font-size:22px;font-weight:600;color:var(--color-text-primary);letter-spacing:-0.02em}
.page-header h1 span{color:var(--color-gold)}
.page-header p{font-size:14px;color:var(--color-text-secondary);margin-top:var(--space-2xs)}
.header-actions{display:flex;gap:var(--space-sm);align-items:center}
.btn-primary{height:36px;padding:0 var(--space-lg);border-radius:var(--radius-md);border:none;background:var(--color-gold);color:var(--color-text-on-gold);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s ease;display:flex;align-items:center;gap:var(--space-xs);font-family:var(--font-sans)}
.btn-primary:hover{background:var(--color-gold-hover);box-shadow:var(--shadow-gold)}
.btn-primary i{font-size:13px}
.btn-secondary{height:36px;padding:0 var(--space-lg);border-radius:var(--radius-md);border:1px solid var(--color-border);background:transparent;color:var(--color-text-secondary);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s ease;display:flex;align-items:center;gap:var(--space-xs);font-family:var(--font-sans)}
.btn-secondary:hover{background:var(--color-surface);border-color:var(--color-border-strong);color:var(--color-text-primary)}

/* Collection Form */
.collect-form{max-width:800px}
.form-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-xl);margin-bottom:var(--space-lg)}
.form-card-title{font-size:15px;font-weight:600;color:var(--color-text-primary);margin-bottom:var(--space-lg);display:flex;align-items:center;gap:var(--space-sm)}
.form-card-title i{color:var(--color-gold);font-size:16px}
.form-card-title .step-badge{width:24px;height:24px;border-radius:50%;background:var(--color-gold);color:var(--color-text-on-gold);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.form-group{margin-bottom:var(--space-md)}
.form-group:last-child{margin-bottom:0}
.form-label{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:var(--space-xs);display:flex;align-items:center;gap:var(--space-2xs)}
.form-label .required{color:var(--color-danger);font-size:14px}
.form-label .hint{font-size:11px;color:var(--color-text-tertiary);font-weight:400}
.form-input,.form-textarea{width:100%;padding:var(--space-sm) var(--space-md);border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-bg-primary);color:var(--color-text-primary);font-size:13px;outline:none;transition:all 0.15s ease;font-family:var(--font-sans)}
.form-input:focus,.form-textarea:focus{border-color:var(--color-border-gold);background:var(--color-surface-hover)}
.form-input::placeholder,.form-textarea::placeholder{color:var(--color-text-tertiary)}
.form-textarea{min-height:80px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md)}
.form-upload{width:100%;padding:var(--space-xl);border-radius:var(--radius-md);border:2px dashed var(--color-border);background:var(--color-bg-primary);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--space-sm);cursor:pointer;transition:all 0.15s ease;color:var(--color-text-tertiary)}
.form-upload:hover{border-color:var(--color-border-gold);background:var(--color-gold-subtle);color:var(--color-gold)}
.form-upload i{font-size:28px}
.form-upload .upload-text{font-size:13px;font-weight:500}
.form-upload .upload-hint{font-size:11px}
.form-check{display:flex;align-items:flex-start;gap:var(--space-sm);padding:var(--space-md);border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-bg-primary);cursor:pointer;transition:all 0.15s ease}
.form-check:hover{border-color:var(--color-border-strong)}
.form-check input[type="checkbox"]{margin-top:3px;accent-color:var(--color-gold);width:16px;height:16px;cursor:pointer}
.form-check-text{flex:1}
.form-check-text .check-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.form-check-text .check-desc{font-size:12px;color:var(--color-text-tertiary);margin-top:2px}
.form-actions{display:flex;gap:var(--space-sm);margin-top:var(--space-lg)}

@media(max-width:768px){
  .sidebar{width:60px}
  .sidebar-brand .brand-text,.sidebar-nav .nav-item span,.sidebar-nav .nav-section-title,.sidebar-nav .nav-item .nav-badge,.sidebar-footer .user-mini-info,.sidebar-footer .user-mini i{display:none}
  .sidebar-brand{justify-content:center;padding:0}
  .sidebar-nav .nav-item{justify-content:center;padding:0;height:48px}
  .sidebar-nav .nav-item i{margin:0}
  .sidebar-nav .nav-item.active::before{left:auto;right:0;top:0;transform:none;width:3px;height:100%}
  .sidebar-footer .user-mini{justify-content:center}
  .main-content{margin-left:60px}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-icon">极</div><div class="brand-text"><span>极享</span>AI</div></div>
    <nav class="sidebar-nav">
      <div class="nav-section"><div class="nav-section-title">核心管理</div>
        <a class="nav-item"><i class="fas fa-chart-pie"></i><span>数据驾驶舱</span></a>
        <a class="nav-item"><i class="fas fa-th-large"></i><span>产品矩阵</span></a>
        <a class="nav-item"><i class="fas fa-handshake"></i><span>销售成交</span><span class="nav-badge">12</span></a>
        <a class="nav-item"><i class="fas fa-user-tie"></i><span>招商代理</span></a>
        <a class="nav-item"><i class="fas fa-bullhorn"></i><span>营销推广</span></a>
      </div>
      <div class="nav-section"><div class="nav-section-title">内容中心</div>
        <a class="nav-item"><i class="fas fa-images"></i><span>内容素材中心</span></a>
        <a class="nav-item active"><i class="fas fa-star"></i><span>案例见证中心</span></a>
        <a class="nav-item"><i class="fas fa-graduation-cap"></i><span>培训赋能中心</span></a>
      </div>
      <div class="nav-section"><div class="nav-section-title">运营管理</div>
        <a class="nav-item"><i class="fas fa-users"></i><span>客户管理</span></a>
        <a class="nav-item"><i class="fas fa-file-invoice"></i><span>订单管理</span></a>
        <a class="nav-item"><i class="fas fa-robot"></i><span>AI 智能体</span></a>
        <a class="nav-item"><i class="fas fa-phone-alt"></i><span>呼叫中心</span></a>
      </div>
      <div class="nav-section"><div class="nav-section-title">系统</div>
        <a class="nav-item"><i class="fas fa-cog"></i><span>系统设置</span></a>
        <a class="nav-item"><i class="fas fa-file-alt"></i><span>操作日志</span></a>
        <a class="nav-item"><i class="fas fa-question-circle"></i><span>帮助中心</span></a>
      </div>
    </nav>
    <div class="sidebar-footer"><div class="user-mini"><div class="user-mini-avatar">张</div><div class="user-mini-info"><div class="user-mini-name">张明远</div><div class="user-mini-role">运营总监</div></div><i class="fas fa-ellipsis-v" style="font-size:14px;color:var(--color-text-tertiary)"></i></div></div>
  </aside>
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-title"><span>案例</span>见证中心</div>
      <div class="topbar-spacer"></div>
      <div class="topbar-date"><i class="far fa-calendar-alt"></i> 2025年3月24日 周一</div>
      <div class="topbar-actions"><button class="topbar-btn"><i class="far fa-bell"></i><span class="dot"></span></button><button class="topbar-btn"><i class="far fa-question-circle"></i></button><div class="topbar-avatar">张</div></div>
    </header>
    <div class="content-area">
      <div class="page-header">
        <div><h1>案例<span>收集</span></h1><p>在线收集客户成功案例信息，标准化录入</p></div>
        <div class="header-actions"><button class="btn-secondary"><i class="fas fa-share-alt"></i> 分享收集链接</button></div>
      </div>

      <div class="collect-form">
        <!-- Step 1: 客户背景 -->
        <div class="form-card">
          <div class="form-card-title"><span class="step-badge">1</span>客户背景信息</div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">客户姓名 <span class="required">*</span></label>
              <input class="form-input" type="text" placeholder="请输入客户姓名">
            </div>
            <div class="form-group">
              <label class="form-label">联系电话 <span class="required">*</span></label>
              <input class="form-input" type="tel" placeholder="请输入手机号码">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">客户类型 <span class="required">*</span></label>
              <input class="form-input" type="text" placeholder="个人创作者 / 服务商 / B端企业">
            </div>
            <div class="form-group">
              <label class="form-label">所属行业</label>
              <input class="form-input" type="text" placeholder="教育/电商/实体/传媒/其他">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">使用产品版本</label>
            <input class="form-input" type="text" placeholder="标准版 / 代理版 / 贴牌版 / 合伙人版">
          </div>
        </div>

        <!-- Step 2: 问题与方案 -->
        <div class="form-card">
          <div class="form-card-title"><span class="step-badge">2</span>问题与解决方案</div>
          <div class="form-group">
            <label class="form-label">使用前背景描述 <span class="required">*</span></label>
            <textarea class="form-textarea" placeholder="请描述客户使用产品前的状态、遇到的困难和挑战..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">核心痛点 <span class="hint">（至少列出2个）</span></label>
            <textarea class="form-textarea" placeholder="例：1. 每天拍摄口播耗时4小时以上 2. 视频播放量长期在500以下 3. 无法坚持日更"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">使用方式与过程</label>
            <textarea class="form-textarea" placeholder="客户如何使用极享AI产品，具体的使用场景和方法..."></textarea>
          </div>
        </div>

        <!-- Step 3: 成果数据 -->
        <div class="form-card">
          <div class="form-card-title"><span class="step-badge">3</span>成果数据</div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">使用时长</label>
              <input class="form-input" type="text" placeholder="如：3个月">
            </div>
            <div class="form-group">
              <label class="form-label">关键指标1</label>
              <input class="form-input" type="text" placeholder="如：粉丝从200增长至1.2万">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">关键指标2</label>
              <input class="form-input" type="text" placeholder="如：内容产出效率提升8倍">
            </div>
            <div class="form-group">
              <label class="form-label">关键指标3</label>
              <input class="form-input" type="text" placeholder="如：月收入达到3万元">
            </div>
          </div>
        </div>

        <!-- Step 4: 截图上传 -->
        <div class="form-card">
          <div class="form-card-title"><span class="step-badge">4</span>素材上传</div>
          <div class="form-group">
            <label class="form-label">数据截图 <span class="hint">（支持 JPG/PNG，建议 1080×720）</span></label>
            <div class="form-upload">
              <i class="fas fa-cloud-upload-alt"></i>
              <span class="upload-text">点击上传截图</span>
              <span class="upload-hint">支持拖拽或点击上传，最多5张</span>
            </div>
          </div>
          <div class="form-group" style="margin-top:var(--space-md)">
            <label class="form-label">客户头像 <span class="hint">（可选，用于案例展示）</span></label>
            <div class="form-upload" style="padding:var(--space-lg);flex-direction:row;">
              <i class="fas fa-user-circle" style="font-size:20px"></i>
              <span class="upload-text">上传头像</span>
            </div>
          </div>
        </div>

        <!-- Step 5: 授权确认 -->
        <div class="form-card">
          <div class="form-card-title"><span class="step-badge">5</span>授权确认</div>
          <div class="form-group">
            <label class="form-label">客户评价 <span class="hint">（10-30字推荐语）</span></label>
            <textarea class="form-textarea" placeholder="请输入客户原话评价..." style="min-height:60px"></textarea>
          </div>
          <div class="form-check">
            <input type="checkbox" id="agree1">
            <div class="form-check-text">
              <div class="check-title">已获得客户授权使用其案例信息</div>
              <div class="check-desc">确认客户同意将其案例用于极享AI官方宣传展示</div>
            </div>
          </div>
          <div class="form-check" style="margin-top:var(--space-sm)">
            <input type="checkbox" id="agree2">
            <div class="form-check-text">
              <div class="check-title">案例信息真实有效</div>
              <div class="check-desc">确认上述数据和信息经过客户确认属实</div>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn-primary" style="padding:0 var(--space-2xl);height:40px;font-size:14px"><i class="fas fa-paper-plane"></i> 提交案例</button>
          <button class="btn-secondary"><i class="fas fa-save"></i> 保存草稿</button>
          <button class="btn-secondary"><i class="fas fa-undo"></i> 重置</button>
        </div>
      </div>
    </div>
  </main>
</div>
</body>
</html>
